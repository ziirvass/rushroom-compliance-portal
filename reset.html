<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set password · Rushroom Compliance Portal</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="./assets/styles.css?v=55" />
</head>
<body data-page="reset">
  <header class="site-header">
    <div class="wrap header-row">
      <div>
        <span class="badge">VALCYRA · Rushroom AB</span>
        <h1>Compliance Portal</h1>
        <p class="tagline">Set your password</p>
      </div>
      <nav aria-label="Views"><a class="btn btn-sm" href="./index.html">Back to portal →</a></nav>
    </div>
  </header>

  <main id="main" class="wrap">
    <section class="gate" aria-labelledby="r-title">
      <div class="gate-card">
        <h2 id="r-title">Set a new password</h2>
        <p id="r-msg" class="muted">Choose a password of at least 8 characters.</p>
        <form id="r-form" novalidate>
          <label class="form-row"><span class="form-label">New password</span>
            <input id="r-pass" class="up-text" type="password" autocomplete="new-password" placeholder="At least 8 characters" required /></label>
          <label class="form-row"><span class="form-label">Confirm</span>
            <input id="r-pass2" class="up-text" type="password" autocomplete="new-password" placeholder="Repeat password" required /></label>
          <div style="margin-top:0.6rem"><button id="r-submit" class="btn btn-primary" type="submit">Set password</button></div>
          <p id="r-err" class="form-error" role="alert" aria-live="assertive"></p>
        </form>
        <div id="r-actions" style="margin-top:1rem"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer"><div class="wrap">Internal compliance overview for Rushroom AB ·</div></footer>

  <script src="./assets/config.js?v=55"></script>
  <script src="./assets/api.js?v=55"></script>
  <script>
    (function () {
      var form = document.getElementById("r-form");
      var pass = document.getElementById("r-pass");
      var pass2 = document.getElementById("r-pass2");
      var err = document.getElementById("r-err");
      var msg = document.getElementById("r-msg");
      var title = document.getElementById("r-title");
      var actions = document.getElementById("r-actions");
      var submit = document.getElementById("r-submit");
      var token = new URLSearchParams(location.search).get("token");

      function fail(text) {
        form.hidden = true;
        title.textContent = "Link problem";
        msg.className = "form-error"; msg.textContent = text;
        actions.innerHTML = '<a class="btn btn-primary" href="./index.html">Go to the portal</a>';
      }
      if (!token) { fail("This link is missing its token."); return; }
      if (!window.PortalAPI || !window.PortalAPI.configured()) { fail("The portal backend isn't configured."); return; }

      form.addEventListener("submit", function (e) {
        e.preventDefault(); err.textContent = "";
        if (pass.value.length < 8) { err.textContent = "Choose a password of at least 8 characters."; return; }
        if (pass.value !== pass2.value) { err.textContent = "The two passwords don't match."; return; }
        submit.disabled = true;
        window.PortalAPI.setPassword(token, pass.value)
          .then(function () {
            form.hidden = true;
            title.textContent = "Password set ✓";
            msg.className = "ok"; msg.textContent = "Your password is set and your email is confirmed. You can now sign in.";
            actions.innerHTML = '<a class="btn btn-primary" href="./index.html">Go to sign in</a>';
          })
          .catch(function (ex) { submit.disabled = false; err.textContent = ex.message || "This link is invalid or has expired."; });
      });
    })();
  </script>
</body>
</html>
